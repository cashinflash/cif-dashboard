<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash in Flash — Underwriting</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f4425 0%,#1a6b3c 50%,#0f4425 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;padding:1rem}
.card{background:white;border-radius:24px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:32px}
.logo img{height:34px;object-fit:contain}
.logo-txt{font-size:22px;font-weight:800;color:#1a6b3c;display:none}

.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:700;color:#2d4235;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
input{width:100%;border:1.5px solid #ccd6ce;border-radius:10px;padding:13px 14px;font-size:15px;font-family:'Poppins',sans-serif;color:#0e1a12;transition:border-color .15s,box-shadow .15s}
input:focus{outline:none;border-color:#1a6b3c;box-shadow:0 0 0 3px rgba(26,107,60,.1)}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#144f2c,#1a6b3c);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;margin-top:8px;transition:all .2s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,107,60,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn.loading{color:transparent}
.btn.loading::after{content:'';position:absolute;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;top:50%;left:50%;margin:-10px;animation:spin .7s linear infinite}
.err{background:#fdf2f2;border:1px solid #f5b8b0;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;font-weight:500;margin-top:14px;display:none}
.err.show{display:block}
.badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;font-size:11px;color:#8fa197}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo" style="margin-bottom:28px">
    <img src="https://sp-ao.shortpixel.ai/client/to_webp,q_lossless,ret_img/https://cashinflash.com/wp-content/uploads/2025/08/logo_500px.png" alt="Cash in Flash" onerror="this.style.display='none';document.querySelector('.logo-txt').style.display='block'">
    <div class="logo-txt">Cash in Flash</div>
  </div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="btn" onclick="login()">Sign In</button>
  <div class="err" id="err"></div>
  <div class="badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Internal use only · Cash in Flash
  </div>
</div>
<script>
async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!u || !p) { err.textContent='Please enter username and password'; err.classList.add('show'); return; }
  btn.disabled=true; btn.classList.add('loading'); err.classList.remove('show');
  try {
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({username:u,password:p})
    });
    const d = await r.json();
    if (d.ok) {
      // Cookie is set by server — just navigate
      sessionStorage.setItem('cif_user', d.user);
      sessionStorage.setItem('cif_token', d.token);
      window.location.replace('/app.html');
    } else {
      err.textContent = d.error || 'Invalid credentials';
      err.classList.add('show');
      btn.disabled=false; btn.classList.remove('loading');
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
    btn.disabled=false; btn.classList.remove('loading');
  }
}
</script>
</body>
</html>
