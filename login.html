<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cash in Flash — Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #1a6b3c;
  --brand-dark: #0f4425;
  --brand-ink: #0a2a18;
  --text: #111a14;
  --muted: #6b7c72;
  --border: #d5ded8;
  --border-focus: #1a6b3c;
  --danger: #b3261e;
  --danger-bg: #fdecea;
  --warn-bg: #fff8e5;
  --warn-border: #f2d46c;
  --warn-ink: #6b4d00;
  --shadow: 0 16px 48px rgba(15, 68, 37, .22);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: linear-gradient(135deg, #0f4425 0%, #1a6b3c 50%, #0f4425 100%);
  font-family: 'Poppins', system-ui, sans-serif;
  color: var(--text);
  display: grid;
  place-items: center;
  padding: 1rem;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 36px 28px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}
.brand { text-align: center; margin-bottom: 28px; }
.brand img { height: 38px; object-fit: contain; display: inline-block; }
.brand-fallback { font-size: 22px; font-weight: 700; color: var(--brand); display: none; }
.tagline {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .14em;
  margin-top: 10px;
}

.field { margin-bottom: 16px; }
.field-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
label {
  font-size: 12px;
  font-weight: 600;
  color: var(--brand-ink);
  letter-spacing: .02em;
}
.input-wrap { position: relative; }
input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font: inherit;
  font-size: 15px;
  color: var(--text);
  background: #fff;
  transition: border-color .15s, box-shadow .15s;
}
input.has-toggle { padding-right: 42px; }
input::placeholder { color: #a6b2ab; }
input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(26, 107, 60, .14);
}
.toggle-visibility {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 34px;
  height: 34px;
  border: 0;
  background: transparent;
  display: grid;
  place-items: center;
  color: var(--muted);
  cursor: pointer;
  border-radius: 8px;
}
.toggle-visibility:hover { color: var(--brand); background: #f3f7f4; }
.toggle-visibility:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }

.btn {
  width: 100%;
  padding: 13px 16px;
  background: var(--brand);
  color: #fff;
  border: 0;
  border-radius: 10px;
  font: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: background .15s, box-shadow .15s, transform .08s;
  position: relative;
  overflow: hidden;
}
.btn:hover { background: #165a33; box-shadow: 0 4px 14px rgba(26, 107, 60, .3); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: .55; cursor: not-allowed; }
.btn.loading { color: transparent; }
.btn.loading::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  top: 50%; left: 50%;
  margin: -9px 0 0 -9px;
  animation: spin .7s linear infinite;
}

.alert {
  margin-top: 14px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  display: none;
}
.alert.show { display: block; }
.alert-err { background: var(--danger-bg); color: var(--danger); border: 1px solid #f1baba; }
.alert-warn { background: var(--warn-bg); color: var(--warn-ink); border: 1px solid var(--warn-border); }

.trust {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid #eef2ef;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}
.trust svg { flex-shrink: 0; }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@media (max-width: 420px) {
  .card { padding: 32px 24px 24px; border-radius: 12px; }
}
</style>
</head>
<body>
<main class="card" role="main">
  <div class="brand">
    <img src="/favicon.png" alt="Cash in Flash" onerror="this.style.display='none';document.querySelector('.brand-fallback').style.display='block'">
    <div class="brand-fallback">Cash in Flash</div>
    <div class="tagline">Staff Portal</div>
  </div>

  <form id="login-form" novalidate>
    <div class="field">
      <div class="field-row"><label for="username">Username</label></div>
      <div class="input-wrap">
        <input type="text" id="username" name="username" placeholder="Enter username"
               autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required>
      </div>
    </div>

    <div class="field">
      <div class="field-row"><label for="password">Password</label></div>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter password"
               autocomplete="current-password" class="has-toggle" required>
        <button type="button" class="toggle-visibility" id="toggle-pw" aria-label="Show password" aria-pressed="false">
          <svg id="eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <path d="M17.94 17.94A10.06 10.06 0 0 1 12 19c-6.5 0-10-7-10-7a18.05 18.05 0 0 1 3.92-4.78"/><path d="M9.9 4.24A10.06 10.06 0 0 1 12 5c6.5 0 10 7 10 7a18.04 18.04 0 0 1-2.14 3.09"/><path d="M1 1l22 22"/><path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="submit-btn">Sign In</button>
    <div class="alert alert-err" id="alert-err" role="alert"></div>
  </form>

  <div class="trust">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Secured connection · Internal use only
  </div>
</main>

<script>
(function () {
  const form = document.getElementById('login-form');
  const pwd = document.getElementById('password');
  const toggle = document.getElementById('toggle-pw');
  const eyeShow = document.getElementById('eye-show');
  const eyeHide = document.getElementById('eye-hide');
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('alert-err');

  toggle.addEventListener('click', function () {
    const showing = pwd.type === 'text';
    pwd.type = showing ? 'password' : 'text';
    toggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    toggle.setAttribute('aria-pressed', String(!showing));
    eyeShow.style.display = showing ? '' : 'none';
    eyeHide.style.display = showing ? 'none' : '';
  });

  function showError(msg) { err.textContent = msg; err.classList.add('show'); }
  function clearError() { err.classList.remove('show'); }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = pwd.value;
    if (!u || !p) { showError('Please enter your username and password.'); return; }
    btn.disabled = true; btn.classList.add('loading'); clearError();
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username: u, password: p }),
      });
      const d = await r.json().catch(() => ({}));
      if (r.ok && d.ok) {
        // Auth cookie is HttpOnly — no token in response body. Just navigate.
        window.location.replace('/app.html');
        return;
      }
      if (r.status === 429) {
        showError(d.error || 'Too many attempts. Please try again later.');
      } else {
        showError(d.error || 'Invalid username or password.');
      }
    } catch (ex) {
      showError('Connection error. Please try again.');
    }
    btn.disabled = false; btn.classList.remove('loading');
  });

  // Prevent unwanted mobile gestures (pinch-zoom, double-tap-to-zoom).
  document.addEventListener('touchmove', function (e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
})();
</script>
</body>
</html>
